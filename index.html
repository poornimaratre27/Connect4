<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Connect 4</title>
    <link rel="stylesheet"
          href="style.css">
</head>
<body>
    <h1>Connect 4</h1>

    <div class="modeSelector">
        <p id="openModePopup">
            Select Mode
        </p>

        <span id="selectedMode">
            Player vs Player
        </span>
    </div>

    <div class="gameContainer">
        <div class="players">
            <div class="player player1">
                🔵 Player 1
            </div>

            <div class="player player2"
                 id="rightPlayer">
                🟡 Player 2
            </div>
        </div>

        <div id="statusText">
            🔵 Player 1 Turn
        </div>
        <div id="board"></div>
    </div>

    <div id="popup">
        <div class="popupBox">
            <h2>
                Select Game Mode
            </h2>
            <div class="modeButtons">
                <button class="modeBtn active"
                        data-mode="pvp">
                    Player vs Player
                </button>
                <button class="modeBtn"
                        data-mode="ai">
                    Player vs AI
                </button>
            </div>
            <button id="startBtn">
                Start Game
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
